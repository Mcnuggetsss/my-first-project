{% extends 'base.html' %}
{% block title %}开新销售单{% endblock %}
{% block head %}
<style>
.item-row { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:12px; margin-bottom:8px; }
.item-row:hover { border-color:#1a6e3c; }
#order-items .remove-btn { opacity:0; transition:.15s; }
#order-items .item-row:hover .remove-btn { opacity:1; }
.total-bar { background:var(--brand); color:#fff; border-radius:10px; padding:16px 24px; }
.filter-group select { border-radius:6px; }
.product-card {
  border:2px solid #e5e7eb; border-radius:8px; padding:10px 12px; cursor:pointer;
  transition:.15s; font-size:.875rem; background:#fff;
}
.product-card:hover { border-color:#1a6e3c; background:#f0faf4; }
.product-card .price { color:var(--brand); font-weight:700; }
</style>
{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-file-earmark-plus me-2"></i>开新销售单</h1>
</div>

<div class="row g-3">
  <!-- Left: Customer + Items -->
  <div class="col-lg-8">
    <!-- Customer -->
    <div class="card mb-3">
      <div class="card-header py-2">客户信息</div>
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">选择已有客户</label>
            <select id="customer-select" class="form-select">
              <option value="">— 选择客户（可选）—</option>
              {% for c in customers %}
              <option value="{{ c.id }}" data-name="{{ c.name }}" data-phone="{{ c.phone }}" data-address="{{ c.address }}">
                {{ c.name }}{% if c.phone %} · {{ c.phone }}{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">客户名称 <span class="text-danger">*</span></label>
            <input type="text" id="customer-name" class="form-control" placeholder="输入客户名称" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">订单日期</label>
            <input type="date" id="order-date" class="form-control" value="{{ today }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">备注</label>
            <input type="text" id="order-notes" class="form-control" placeholder="备注（可选）">
          </div>
        </div>
      </div>
    </div>

    <!-- Product Picker -->
    <div class="card mb-3">
      <div class="card-header py-2 d-flex align-items-center justify-content-between">
        <span>选择产品</span>
        <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#picker">
          <i class="bi bi-chevron-down"></i>
        </button>
      </div>
      <div class="collapse show" id="picker">
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-4">
              <select id="f-series" class="form-select form-select-sm">
                <option value="">全部系列</option>
              </select>
            </div>
            <div class="col-4">
              <select id="f-large" class="form-select form-select-sm">
                <option value="">全部大分类</option>
              </select>
            </div>
            <div class="col-4">
              <select id="f-small" class="form-select form-select-sm">
                <option value="">全部小分类</option>
              </select>
            </div>
          </div>
          <div id="product-grid" class="row g-2"></div>
        </div>
      </div>
    </div>

    <!-- Order Items -->
    <div class="card">
      <div class="card-header py-2">
        <i class="bi bi-list-ul me-1"></i>销售明细
        <span id="item-count" class="badge bg-secondary ms-1">0</span>
      </div>
      <div class="card-body">
        <div id="order-items">
          <div class="text-center text-muted py-4">
            <i class="bi bi-cart-plus" style="font-size:2rem"></i>
            <p class="mt-1 mb-0">点击上方产品加入销售单</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Summary -->
  <div class="col-lg-4">
    <div class="card mb-3 position-sticky" style="top:20px">
      <div class="card-body p-0">
        <div class="total-bar">
          <div class="d-flex justify-content-between align-items-center">
            <span style="opacity:.85">合计金额</span>
            <span id="total-display" style="font-size:1.8rem;font-weight:700">€0.00</span>
          </div>
        </div>
        <div class="p-3">
          <div id="summary-list" class="mb-3" style="max-height:300px;overflow-y:auto;font-size:.85rem;"></div>
          <button id="save-btn" class="btn btn-brand w-100 py-2" onclick="saveOrder()">
            <i class="bi bi-check2-circle me-2"></i>保存销售单
          </button>
          <button class="btn btn-outline-secondary w-100 mt-2" onclick="window.history.back()">
            取消
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allProducts = [];
let catTree = {};
let orderItems = [];
let selectedCid = null;

async function loadData() {
  [allProducts, catTree] = await Promise.all([
    fetch('/api/products').then(r=>r.json()),
    fetch('/api/categories').then(r=>r.json())
  ]);
  populateSeries();
  renderProducts();
}

function populateSeries() {
  const sel = document.getElementById('f-series');
  sel.innerHTML = '<option value="">全部系列</option>';
  Object.keys(catTree).sort().forEach(s => {
    sel.innerHTML += `<option value="${s}">${s}</option>`;
  });
}

document.getElementById('f-series').addEventListener('change', function() {
  const s = this.value;
  const large = document.getElementById('f-large');
  large.innerHTML = '<option value="">全部大分类</option>';
  document.getElementById('f-small').innerHTML = '<option value="">全部小分类</option>';
  if (s && catTree[s]) {
    Object.keys(catTree[s]).sort().forEach(lc => {
      large.innerHTML += `<option value="${lc}">${lc}</option>`;
    });
  }
  renderProducts();
});

document.getElementById('f-large').addEventListener('change', function() {
  const s = document.getElementById('f-series').value;
  const lc = this.value;
  const small = document.getElementById('f-small');
  small.innerHTML = '<option value="">全部小分类</option>';
  if (s && lc && catTree[s]?.[lc]) {
    catTree[s][lc].sort().forEach(sc => {
      small.innerHTML += `<option value="${sc}">${sc}</option>`;
    });
  }
  renderProducts();
});

document.getElementById('f-small').addEventListener('change', renderProducts);

function renderProducts() {
  const s  = document.getElementById('f-series').value;
  const lc = document.getElementById('f-large').value;
  const sc = document.getElementById('f-small').value;
  let filtered = allProducts.filter(p =>
    (!s  || p.series === s) &&
    (!lc || p.large_category === lc) &&
    (!sc || p.small_category === sc)
  );
  const grid = document.getElementById('product-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="col-12 text-muted text-center py-3">暂无产品</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => `
    <div class="col-6 col-md-4">
      <div class="product-card" onclick="addItem(${p.id})">
        <div class="fw-semibold text-truncate">${p.name}</div>
        <div class="text-muted" style="font-size:.75rem">${p.small_category}</div>
        <div class="d-flex justify-content-between align-items-center mt-1">
          <span class="price">€${p.price.toFixed(2)}/${p.unit}</span>
          <span class="badge bg-light text-secondary" style="font-size:.7rem">库存:${p.stock}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function addItem(pid) {
  const p = allProducts.find(x => x.id === pid);
  if (!p) return;
  const existing = orderItems.find(i => i.product_id === pid);
  if (existing) {
    existing.quantity += 1;
    existing.subtotal = +(existing.quantity * existing.unit_price).toFixed(4);
  } else {
    orderItems.push({
      product_id: p.id, product_name: p.name, series: p.series,
      large_category: p.large_category, small_category: p.small_category,
      unit: p.unit, quantity: 1, unit_price: p.price,
      subtotal: p.price
    });
  }
  renderItems();
}

function renderItems() {
  const container = document.getElementById('order-items');
  if (!orderItems.length) {
    container.innerHTML = `
      <div class="text-center text-muted py-4">
        <i class="bi bi-cart-plus" style="font-size:2rem"></i>
        <p class="mt-1 mb-0">点击上方产品加入销售单</p>
      </div>`;
    document.getElementById('item-count').textContent = '0';
    document.getElementById('total-display').textContent = '€0.00';
    document.getElementById('summary-list').innerHTML = '';
    return;
  }
  container.innerHTML = orderItems.map((item, i) => `
    <div class="item-row d-flex align-items-center gap-2">
      <div class="flex-grow-1">
        <div class="fw-semibold">${item.product_name}</div>
        <div class="text-muted" style="font-size:.78rem">${item.series} › ${item.large_category} › ${item.small_category}</div>
      </div>
      <div style="width:90px">
        <div class="input-group input-group-sm">
          <button class="btn btn-outline-secondary px-2" onclick="changeQty(${i},-1)">−</button>
          <input type="number" class="form-control text-center px-1" value="${item.quantity}" min="0.01" step="1"
                 onchange="setQty(${i},this.value)" style="min-width:42px">
          <button class="btn btn-outline-secondary px-2" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <div style="width:70px;text-align:right">
        <input type="number" class="form-control form-control-sm text-end" value="${item.unit_price}" min="0" step="0.01"
               onchange="setPrice(${i},this.value)" title="单价">
      </div>
      <div style="width:80px;text-align:right;font-weight:600;color:var(--brand)">
        €${item.subtotal.toFixed(2)}
      </div>
      <button class="btn btn-sm btn-outline-danger remove-btn" onclick="removeItem(${i})">
        <i class="bi bi-x"></i>
      </button>
    </div>
  `).join('');
  const total = orderItems.reduce((s,i)=>s+i.subtotal,0);
  document.getElementById('total-display').textContent = '€' + total.toFixed(2);
  document.getElementById('item-count').textContent = orderItems.length;
  document.getElementById('summary-list').innerHTML = orderItems.map(item =>
    `<div class="d-flex justify-content-between mb-1">
      <span class="text-truncate me-2">${item.product_name} ×${item.quantity}${item.unit}</span>
      <span class="text-nowrap">€${item.subtotal.toFixed(2)}</span>
     </div>`
  ).join('') + `<hr class="my-1"><div class="d-flex justify-content-between fw-bold">
    <span>合计</span><span>€${total.toFixed(2)}</span></div>`;
}

function changeQty(i, d) {
  orderItems[i].quantity = Math.max(0.01, +(orderItems[i].quantity + d).toFixed(2));
  orderItems[i].subtotal = +(orderItems[i].quantity * orderItems[i].unit_price).toFixed(4);
  renderItems();
}
function setQty(i, v) {
  orderItems[i].quantity = Math.max(0.01, parseFloat(v)||1);
  orderItems[i].subtotal = +(orderItems[i].quantity * orderItems[i].unit_price).toFixed(4);
  renderItems();
}
function setPrice(i, v) {
  orderItems[i].unit_price = Math.max(0, parseFloat(v)||0);
  orderItems[i].subtotal = +(orderItems[i].quantity * orderItems[i].unit_price).toFixed(4);
  renderItems();
}
function removeItem(i) {
  orderItems.splice(i,1);
  renderItems();
}

document.getElementById('customer-select').addEventListener('change', function() {
  const opt = this.options[this.selectedIndex];
  if (opt.value) {
    document.getElementById('customer-name').value = opt.dataset.name;
    selectedCid = opt.value;
  } else {
    selectedCid = null;
  }
});

async function saveOrder() {
  const name = document.getElementById('customer-name').value.trim();
  if (!name) { alert('请填写客户名称'); return; }
  if (!orderItems.length) { alert('请添加至少一个产品'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中…';
  const payload = {
    customer_id: selectedCid, customer_name: name,
    order_date: document.getElementById('order-date').value,
    notes: document.getElementById('order-notes').value,
    items: orderItems
  };
  const res = await fetch('/orders/new', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/orders/' + data.order_id;
  } else {
    alert('保存失败'); btn.disabled=false; btn.textContent='保存销售单';
  }
}

loadData();
</script>
{% endblock %}
