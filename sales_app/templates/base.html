<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}食品批发销售管理{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root {
  --sidebar-w: 220px;
  --brand: #1a6e3c;
  --brand-light: #e8f5ee;
}
body { background: #f4f6f9; font-family: 'Segoe UI', system-ui, sans-serif; }
.sidebar {
  width: var(--sidebar-w); min-height: 100vh; background: var(--brand);
  position: fixed; top:0; left:0; z-index:100; display:flex; flex-direction:column;
}
.sidebar .brand {
  padding: 20px 16px 14px;
  color:#fff; font-weight:700; font-size:1rem; border-bottom:1px solid rgba(255,255,255,.15);
  line-height:1.3;
}
.sidebar .brand small { display:block; font-weight:400; font-size:.75rem; opacity:.7; margin-top:2px; }
.sidebar .nav-link {
  color:rgba(255,255,255,.8); padding:10px 16px; border-radius:6px; margin:2px 8px;
  display:flex; align-items:center; gap:9px; font-size:.9rem;
}
.sidebar .nav-link:hover, .sidebar .nav-link.active {
  background:rgba(255,255,255,.15); color:#fff;
}
.sidebar .nav-link i { font-size:1rem; width:18px; text-align:center; }
.main { margin-left: var(--sidebar-w); padding: 24px; min-height:100vh; }
.page-header { margin-bottom:22px; display:flex; align-items:center; justify-content:space-between; }
.page-header h1 { font-size:1.4rem; font-weight:700; color:#1e2a36; margin:0; }
.card { border:none; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.card-header { background:#fff; border-bottom:1px solid #eee; font-weight:600; border-radius:10px 10px 0 0 !important; }
.stat-card { border-radius:10px; padding:20px; color:#fff; }
.stat-card .num { font-size:2rem; font-weight:700; line-height:1; }
.stat-card .label { font-size:.8rem; opacity:.85; margin-top:4px; }
.badge-confirmed { background:#d1fae5; color:#065f46; }
.badge-pending   { background:#fef3c7; color:#92400e; }
.badge-cancelled { background:#fee2e2; color:#991b1b; }
.table th { font-weight:600; font-size:.85rem; color:#6b7280; text-transform:uppercase; letter-spacing:.03em; background:#f9fafb; }
.btn-brand { background:var(--brand); color:#fff; border:none; }
.btn-brand:hover { background:#155c32; color:#fff; }
.form-label { font-weight:500; font-size:.875rem; }
.modal-header { background:var(--brand); color:#fff; }
.modal-header .btn-close { filter:invert(1); }
@media print {
  .sidebar, .no-print { display:none !important; }
  .main { margin-left:0; padding:0; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="brand">
    <i class="bi bi-basket2-fill me-2"></i>食品批发
    <small>销售管理系统</small>
  </div>
  <nav class="mt-2 flex-grow-1">
    <a href="/" class="nav-link {% if request.path=='/' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> 仪表板
    </a>
    <a href="/orders/new" class="nav-link {% if request.path=='/orders/new' %}active{% endif %}">
      <i class="bi bi-file-earmark-plus"></i> 开新销售单
    </a>
    <a href="/orders" class="nav-link {% if request.path=='/orders' %}active{% endif %}">
      <i class="bi bi-receipt"></i> 历史订单
    </a>
    <hr style="border-color:rgba(255,255,255,.2);margin:8px 16px;">
    <a href="/products" class="nav-link {% if request.path=='/products' %}active{% endif %}">
      <i class="bi bi-box-seam"></i> 产品管理
    </a>
    <a href="/customers" class="nav-link {% if request.path=='/customers' %}active{% endif %}">
      <i class="bi bi-people"></i> 客户管理
    </a>
    <a href="/inventory" class="nav-link {% if request.path=='/inventory' %}active{% endif %}">
      <i class="bi bi-archive"></i> 库存管理
    </a>
  </nav>
  <div style="padding:12px 16px;color:rgba(255,255,255,.4);font-size:.72rem;">v1.0</div>
</div>
<div class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
